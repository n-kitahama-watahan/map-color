<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>世界地図カラーリング</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">World Map Coloring</p>
      <h1>世界地図カラーリング</h1>
    </div>
    <div class="header-actions">
      <button id="downloadSvgBtn" class="primary">SVG保存</button>
      <button id="downloadPngBtn" class="primary">PNG保存</button>
    </div>
  </header>

  <main class="layout">
    <aside class="panel" aria-label="操作パネル">
      <section class="tool-section">
        <h2>色を選ぶ</h2>
        <label class="color-row">
          <span>現在の色</span>
          <input id="colorPicker" type="color" value="#5b8def" />
        </label>
        <div id="palette" class="palette" aria-label="カラーパレット"></div>
        <div class="tool-grid">
          <button id="paintModeBtn" class="active" type="button">塗る</button>
          <button id="eraseModeBtn" type="button">消す</button>
          <button id="pickModeBtn" type="button">色を拾う</button>
          <button id="resetViewBtn" type="button">表示リセット</button>
        </div>
      </section>

      <section class="tool-section">
        <h2>国を探す</h2>
        <input id="countrySearch" type="search" placeholder="例: Japan / France" autocomplete="off" />
        <div id="countryInfo" class="country-info">国をクリックするとここに表示されます。</div>
      </section>

      <section class="tool-section">
        <h2>保存・読み込み</h2>
        <div class="tool-grid one-line">
          <button id="saveStateBtn" type="button">配色を保存</button>
          <button id="loadStateBtn" type="button">配色を復元</button>
          <button id="exportJsonBtn" type="button">JSON書き出し</button>
          <label class="file-button">
            JSON読み込み
            <input id="importJsonInput" type="file" accept="application/json,.json" />
          </label>
        </div>
        <button id="clearBtn" class="danger" type="button">すべての色をクリア</button>
      </section>

      <section class="tool-section help">
        <h2>使い方</h2>
        <p>国をクリックして色を塗ります。マウスホイールで拡大、ドラッグで移動できます。</p>
        <p>検索欄に国名を入れると該当国を強調表示します。</p>
      </section>
    </aside>

    <section class="map-card">
      <div class="map-toolbar">
        <span id="statusText">地図データを読み込み中...</span>
        <span id="modeText">モード: 塗る</span>
      </div>
      <div class="map-wrap">
        <svg id="worldMap" viewBox="0 0 1200 680" role="img" aria-label="色を塗れる世界地図">
          <defs>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity="0.12" />
            </filter>
          </defs>
          <rect class="ocean" width="1200" height="680" rx="28" />
          <g id="mapLayer"></g>
        </svg>
      </div>
    </section>
  </main>

  <template id="toastTemplate">
    <div class="toast"></div>
  </template>
  <div id="toastStack" class="toast-stack" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
