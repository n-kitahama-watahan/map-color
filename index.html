<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界地図 色塗りアプリ</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: inline-block;
        }
        button, input[type="color"] {
            cursor: pointer;
            padding: 8px 15px;
            margin: 0 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            font-size: 14px;
        }
        button:hover {
            background: #e9e9e9;
        }
        .map-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border: 1px solid #ddd;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        /* SVG内の国（path）にホバーした時のエフェクト */
        svg path {
            cursor: pointer;
            transition: opacity 0.2s;
            stroke: #ffffff; /* 国境線の色 */
            stroke-width: 1px;
        }
        svg path:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h1>世界地図 色塗りアプリ</h1>
    
    <div class="controls">
        <label for="colorPicker">色を選ぶ: </label>
        <input type="color" id="colorPicker" value="#ff5722">
        <button onclick="downloadSVG()">SVGで保存</button>
        <button onclick="downloadPNG()">PNGで保存</button>
    </div>

    <div class="map-container">
        <svg id="world-map" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
            <rect width="800" height="400" fill="#e0f7fa"/>
            <path id="country1" d="M100,100 Q150,50 200,100 T300,150 L250,250 L100,200 Z" fill="#cccccc" />
            <path id="country2" d="M350,150 Q400,100 500,150 T600,250 L450,300 Z" fill="#cccccc" />
            <path id="country3" d="M200,250 Q250,350 350,300 T450,350 L300,380 Z" fill="#cccccc" />
            <text x="170" y="150" fill="black" pointer-events="none">国A</text>
            <text x="450" y="220" fill="black" pointer-events="none">国B</text>
            <text x="320" y="320" fill="black" pointer-events="none">国C</text>
        </svg>
    </div>

    <script>
        const colorPicker = document.getElementById('colorPicker');
        const svgMap = document.getElementById('world-map');
        const paths = svgMap.querySelectorAll('path');

        // 各国（path）にクリックイベントを追加
        paths.forEach(path => {
            path.addEventListener('click', function() {
                // 選択されている色で塗りつぶす
                this.setAttribute('fill', colorPicker.value);
            });
        });

        // --- SVG保存機能 ---
        function downloadSVG() {
            const serializer = new XMLSerializer();
            const svgString = serializer.serializeToString(svgMap);
            const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            
            triggerDownload(url, 'colored_map.svg');
        }

        // --- PNG保存機能 ---
        function downloadPNG() {
            const serializer = new XMLSerializer();
            const svgString = serializer.serializeToString(svgMap);
            // SVGに幅と高さを明示的に設定しないとCanvas描画時にバグる場合があるため対策
            const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(svgBlob);

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();

            img.onload = function() {
                // CanvasのサイズをSVGの元のサイズに合わせる
                canvas.width = 800; // SVGのviewBoxに合わせる
                canvas.height = 400;
                
                // SVG画像をCanvasに描画
                ctx.drawImage(img, 0, 0);
                URL.revokeObjectURL(url); // メモリ解放

                // CanvasをPNGのデータURLに変換
                const pngUrl = canvas.toDataURL("image/png");
                triggerDownload(pngUrl, 'colored_map.png');
            };
            img.src = url;
        }

        // ダウンロードを実行するヘルパー関数
        function triggerDownload(url, filename) {
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
