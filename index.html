<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界地図 色塗りアプリ (ズーム機能付き)</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: inline-block;
        }
        button, input[type="color"] {
            cursor: pointer;
            padding: 8px 15px;
            margin: 0 3px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            font-size: 14px;
        }
        button:hover {
            background: #e9e9e9;
        }
        .separator {
            display: inline-block;
            width: 1px;
            height: 20px;
            background-color: #ccc;
            vertical-align: middle;
            margin: 0 10px;
        }
        /* マップ表示エリアのスタイル調整 */
        .map-container {
            max-width: 1000px;
            height: 600px; /* 高さを固定してスクロール可能にする */
            margin: 0 auto;
            background: white;
            border: 1px solid #ddd;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: auto; /* ズーム時にはみ出た部分をスクロールさせる */
            position: relative;
        }
        .map-container svg {
            display: block;
            transition: width 0.2s ease-out, height 0.2s ease-out; /* ズームを滑らかにする */
        }
        .map-container svg path {
            cursor: pointer;
            transition: opacity 0.2s;
            stroke: #ffffff;
            stroke-width: 0.5px;
        }
        .map-container svg path:hover {
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <h1>世界地図 色塗りアプリ</h1>
    
    <div class="controls">
        <label for="colorPicker">色: </label>
        <input type="color" id="colorPicker" value="#ff5722">
        
        <div class="separator"></div>
        
        <button onclick="zoomIn()">拡大 ＋</button>
        <button onclick="zoomOut()">縮小 －</button>
        <button onclick="resetZoom()">リセット</button>
        
        <div class="separator"></div>

        <button onclick="downloadSVG()">SVG保存</button>
        <button onclick="downloadPNG()">PNG保存</button>
    </div>

    <div class="map-container" id="mapContainer">
        <p style="padding: 20px;">地図を読み込んでいます...</p>
    </div>

    <script>
        const colorPicker = document.getElementById('colorPicker');
        const mapContainer = document.getElementById('mapContainer');
        let svgMap = null;
        
        // ズーム倍率を管理する変数
        let currentZoom = 1;
        const zoomStep = 0.3; // 1回クリックごとの拡大・縮小幅

        window.addEventListener('DOMContentLoaded', () => {
            fetch('map.svg')
                .then(response => {
                    if (!response.ok) throw new Error('map.svg が見つかりません。');
                    return response.text();
                })
                .then(svgText => {
                    mapContainer.innerHTML = svgText;
                    svgMap = mapContainer.querySelector('svg');
                    
                    if (!svgMap) return mapContainer.innerHTML = '<p>SVG要素がありません。</p>';

                    // 初期サイズの設定
                    svgMap.style.width = '100%';
                    svgMap.style.height = '100%';

                    setupColoring();
                })
                .catch(error => {
                    mapContainer.innerHTML = `<p style="color:red;">エラー: ${error.message}</p>`;
                });
        });

        function setupColoring() {
            const paths = svgMap.querySelectorAll('path');
            paths.forEach(path => {
                path.addEventListener('click', function() {
                    this.setAttribute('fill', colorPicker.value);
                });
            });
        }

        // --- ズーム機能 ---
        function zoomIn() {
            if (!svgMap) return;
            currentZoom += zoomStep;
            applyZoom();
        }

        function zoomOut() {
            if (!svgMap) return;
            // 縮小しすぎて消えないように下限を設定
            if (currentZoom > 0.4) { 
                currentZoom -= zoomStep;
                applyZoom();
            }
        }

        function resetZoom() {
            if (!svgMap) return;
            currentZoom = 1;
            applyZoom();
            // スクロール位置を一番左上に戻す
            mapContainer.scrollTop = 0;
            mapContainer.scrollLeft = 0;
        }

        function applyZoom() {
            // CSSのwidth/heightをパーセントで変更して拡大縮小する
            svgMap.style.width = `${currentZoom * 100}%`;
            svgMap.style.height = `${currentZoom * 100}%`;
        }

        // --- 保存機能 ---
        function downloadSVG() {
            if (!svgMap) return alert('地図が読み込まれていません。');
            const serializer = new XMLSerializer();
            const svgString = serializer.serializeToString(svgMap);
            const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
            triggerDownload(URL.createObjectURL(blob), 'colored_map.svg');
        }

        function downloadPNG() {
            if (!svgMap) return alert('地図が読み込まれていません。');
            const serializer = new XMLSerializer();
            const svgString = serializer.serializeToString(svgMap);
            const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(svgBlob);

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();

            img.onload = function() {
                // viewBoxから本来のSVGサイズを取得してCanvasのサイズを決定
                // ズーム（CSSサイズ）に関わらず、常に高画質で本来のサイズで書き出します
                const viewBox = svgMap.viewBox.baseVal;
                canvas.width = viewBox.width || 1200; 
                canvas.height = viewBox.height || 600;
                
                // SVGに背景色が指定されていない場合、PNGが透過になってしまうため白背景を敷く
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.drawImage(img, 0, 0);
                URL.revokeObjectURL(url);

                triggerDownload(canvas.toDataURL("image/png"), 'colored_map.png');
            };
            img.src = url;
        }

        function triggerDownload(url, filename) {
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
